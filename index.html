<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scaling Legal — CEO Dashboard</title>
  <!-- PWA & Webapp -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CEO Dashboard">
  <meta name="application-name" content="CEO Dashboard">
  <meta name="theme-color" content="#1d1d1f">
  <meta name="description" content="Scaling Legal CEO Dashboard — time tracking, schedule, contracts, obligations">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      min-height: 100vh;
      padding: 32px 16px 64px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    .top-row {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      margin-bottom: 0;
    }

    .top-row .card {
      flex: 1;
      min-width: 0;
    }

    @media (max-width: 680px) {
      .top-row {
        flex-direction: column;
      }
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    header h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    header .sub {
      font-size: 13px;
      color: #6e6e73;
      margin-top: 2px;
    }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
      color: #1a6b3a;
      background: #e8f5e9;
      padding: 4px 10px;
      border-radius: 20px;
    }

    .live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #1a6b3a;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.4;
      }
    }

    .card {
      background: #fff;
      border-radius: 14px;
      padding: 20px 22px;
      margin-bottom: 20px;
      border: 1px solid #e5e5ea;
    }

    .card-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 16px;
      letter-spacing: -0.2px;
    }

    .month-nav {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .month-nav button {
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      color: #6e6e73;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background 0.15s;
    }

    .month-nav button:hover {
      background: #f0f0f5;
    }

    .month-nav button:disabled {
      opacity: 0.25;
      cursor: default;
    }

    .month-label {
      font-size: 15px;
      font-weight: 600;
    }

    .dot-nav {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #d1d1d6;
      cursor: pointer;
      transition: all 0.15s;
    }

    .dot.active {
      background: #0071e3;
      transform: scale(1.35);
    }

    .dot.has-data {
      background: #86868b;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 18px;
    }

    @media (max-width: 480px) {
      .stats-row {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .stat-box {
      background: #f5f5f7;
      border-radius: 10px;
      padding: 12px 14px;
    }

    .stat-box .val {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #1d1d1f;
    }

    .stat-box .lbl {
      font-size: 11px;
      color: #6e6e73;
      margin-top: 2px;
    }

    .client-row {
      margin-bottom: 14px;
    }

    .client-row:last-child {
      margin-bottom: 0;
    }

    .client-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 5px;
    }

    .client-name {
      font-size: 14px;
      font-weight: 600;
    }

    .client-name.zero {
      color: #aeaeb2;
    }

    .client-hours {
      font-size: 13px;
      color: #6e6e73;
    }

    .client-meta {
      font-size: 12px;
      color: #aeaeb2;
      margin-bottom: 5px;
    }

    .progress-track {
      height: 4px;
      background: #e5e5ea;
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 2px;
      background: #0071e3;
      transition: width 0.4s ease;
    }

    .progress-fill.zero {
      background: transparent;
    }

    .drive-link {
      display: inline-block;
      margin-top: 16px;
      font-size: 13px;
      font-weight: 500;
      color: #0071e3;
      text-decoration: none;
    }

    .drive-link:hover {
      text-decoration: underline;
    }

    .no-data {
      color: #aeaeb2;
      font-size: 13px;
      padding: 24px 0;
      text-align: center;
    }

    .btn-primary {
      display: inline-block;
      padding: 8px 16px;
      background: #0071e3;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }

    .btn-primary:hover {
      background: #005bb5;
    }

    .btn-secondary {
      display: inline-block;
      padding: 8px 16px;
      background: #636366;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      margin-left: 10px;
    }

    .btn-secondary:hover {
      background: #48484a;
    }

    .schedule-date {
      font-size: 13px;
      color: #6e6e73;
      margin-bottom: 16px;
      font-weight: 500;
    }

    .all-day-events {
      margin-bottom: 18px;
    }

    .all-day-event {
      background: #fff8e1;
      border-left: 3px solid #d68910;
      padding: 10px 12px;
      border-radius: 6px;
      margin-bottom: 8px;
      font-size: 12px;
    }

    .all-day-event a {
      color: #1d1d1f;
      text-decoration: none;
      font-weight: 600;
    }

    .all-day-event a:hover {
      text-decoration: underline;
    }

    .cal-event {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      padding: 10px 0;
      border-bottom: 1px solid #f0f0f0;
      position: relative;
    }

    .cal-event:last-child {
      border-bottom: none;
    }

    .cal-time {
      font-size: 12px;
      color: #6e6e73;
      min-width: 80px;
      padding-top: 2px;
      flex-shrink: 0;
      line-height: 1.3;
      cursor: pointer;
      border-radius: 6px;
      padding: 4px 6px;
      margin-left: -6px;
      transition: background 0.15s;
      user-select: none;
    }

    .cal-time:hover {
      background: #f0f0f5;
    }

    .cal-time-edit {
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 80px;
    }

    .cal-time-edit input {
      font-size: 12px;
      font-family: inherit;
      color: #1d1d1f;
      border: 1px solid #0071e3;
      border-radius: 5px;
      padding: 3px 6px;
      width: 70px;
      outline: none;
    }

    .cal-info {
      flex: 1;
    }

    .cal-title {
      font-size: 14px;
      font-weight: 600;
      color: #1d1d1f;
    }

    .cal-title a {
      color: inherit;
      text-decoration: none;
    }

    .cal-title a:hover {
      text-decoration: underline;
    }

    .cal-subtitle {
      font-size: 12px;
      color: #aeaeb2;
      margin-top: 2px;
    }

    .cal-cleaning {
      opacity: 0.5;
    }

    .cal-hint {
      text-align: center;
      color: #aeaeb2;
      font-size: 12px;
      margin-top: 10px;
    }

    .rh-card {
      background: #fff;
      border-radius: 14px;
      padding: 20px 22px;
      margin-bottom: 20px;
      border: 1px solid #e5e5ea;
      overflow-x: auto;
    }

    .rh-card .card-title {
      margin-bottom: 14px;
    }

    .rh-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .rh-table th {
      text-align: left;
      padding: 6px 10px;
      font-weight: 600;
      color: #6e6e73;
      border-bottom: 1px solid #e5e5ea;
      white-space: nowrap;
    }

    .rh-table td {
      padding: 8px 10px;
      border-bottom: 1px solid #f5f5f7;
      white-space: nowrap;
    }

    .rh-table .client-col {
      font-weight: 600;
      min-width: 100px;
    }

    .rh-table .cap-col {
      font-size: 11px;
      color: #aeaeb2;
    }

    .rh-mini {
      display: inline-block;
      width: 40px;
      height: 4px;
      border-radius: 2px;
      background: #e5e5ea;
      vertical-align: middle;
      margin-left: 4px;
      overflow: hidden;
    }

    .rh-mini-fill {
      display: block;
      height: 100%;
      border-radius: 2px;
      background: #0071e3;
    }

    .rh-current {
      font-weight: 700;
    }

    .rh-unused {
      font-weight: 700;
      color: #aeaeb2;
      font-size: 13px;
    }

    .rh-unused-sub {
      font-size: 11px;
      color: #c7c7cc;
    }

    .rc-client {
      padding: 16px 0;
      border-bottom: 1px solid #f0f0f5;
    }

    .rc-client:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .rc-client:first-child {
      padding-top: 0;
    }

    .rc-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 6px;
    }

    .rc-name {
      font-size: 14px;
      font-weight: 600;
    }

    .rc-cap {
      font-size: 12px;
      color: #6e6e73;
    }

    .rc-bar-track {
      height: 8px;
      background: #e5e5ea;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .rc-bar-fill {
      height: 100%;
      border-radius: 4px;
      background: #0071e3;
      transition: width 0.4s ease;
    }

    .rc-bar-fill.over {
      background: #c0392b;
    }

    .rc-stats {
      display: flex;
      gap: 16px;
      font-size: 12px;
      color: #6e6e73;
      margin-bottom: 12px;
    }

    .rc-stats strong {
      color: #1d1d1f;
      font-weight: 600;
    }

    .rc-months {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 6px;
    }

    .rc-month {
      text-align: center;
    }

    .rc-month-bar-wrap {
      height: 48px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      margin-bottom: 4px;
    }

    .rc-month-bar {
      width: 100%;
      max-width: 36px;
      background: #d1d1d6;
      border-radius: 3px;
      min-height: 3px;
      transition: height 0.3s;
    }

    .rc-month-bar.active {
      background: #0071e3;
    }

    .rc-month-bar.over {
      background: #c0392b;
    }

    .rc-month-label {
      font-size: 11px;
      color: #aeaeb2;
      margin-bottom: 2px;
    }

    .rc-month-hours {
      font-size: 12px;
      font-weight: 600;
      color: #1d1d1f;
    }

    .rc-month-hours.zero {
      color: #d1d1d6;
      font-weight: 400;
    }

    .rc-cap-line {
      font-size: 11px;
      color: #aeaeb2;
      text-align: right;
      margin-top: 4px;
    }

    .ob-section-header {
      font-size: 13px;
      font-weight: 700;
      margin: 18px 0 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .ob-section-header:first-child {
      margin-top: 0;
    }

    .ob-row {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 10px 0;
      border-bottom: 1px solid #f5f5f7;
    }

    .ob-row:last-child {
      border-bottom: none;
    }

    .ob-info {
      flex: 1;
    }

    .ob-title {
      font-size: 13px;
      font-weight: 600;
      color: #1d1d1f;
    }

    .ob-title a {
      color: inherit;
      text-decoration: none;
    }

    .ob-title a:hover {
      text-decoration: underline;
    }

    .ob-row.overdue .ob-title {
      color: #c0392b;
    }

    .ob-sub {
      font-size: 11px;
      color: #aeaeb2;
      margin-top: 2px;
    }

    .ob-date {
      font-size: 11px;
      font-weight: 600;
      flex-shrink: 0;
      padding-top: 3px;
    }

    .ob-date.overdue {
      color: #c0392b;
    }

    .ob-date.soon {
      color: #d68910;
    }

    .ob-date.upcoming {
      color: #1a6b3a;
    }

    .ob-date.future {
      color: #aeaeb2;
    }

    .ob-check {
      width: 18px;
      height: 18px;
      border-radius: 5px;
      border: 1.5px solid #d1d1d6;
      background: #fff;
      flex-shrink: 0;
      cursor: pointer;
      margin-top: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
    }

    .ob-check:hover {
      border-color: #0071e3;
    }

    .ob-check.checked {
      background: #0071e3;
      border-color: #0071e3;
    }

    .ob-check.checked::after {
      content: '';
      display: block;
      width: 4px;
      height: 8px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
      margin-top: -2px;
    }

    .ob-row.done {
      opacity: 0.35;
    }

    .ob-row.done .ob-title {
      text-decoration: line-through;
    }

    .contracts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }

    .contract-item {
      background: #f5f5f7;
      border-radius: 10px;
      padding: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .contract-item .name {
      font-size: 14px;
      font-weight: 600;
    }

    .contract-item a {
      font-size: 12px;
      font-weight: 600;
      color: #0071e3;
      text-decoration: none;
    }

    .contract-item a:hover {
      text-decoration: underline;
    }

    .generator-card {
      background: #fff;
      border-radius: 14px;
      padding: 20px 22px;
      margin-bottom: 20px;
      border: 1px solid #e5e5ea;
    }

    .generator-card .card-title {
      margin-bottom: 8px;
    }

    .generator-desc {
      font-size: 13px;
      color: #6e6e73;
      margin-bottom: 14px;
      line-height: 1.5;
    }

    .generator-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .sync-footer {
      text-align: center;
      font-size: 12px;
      color: #aeaeb2;
      padding: 12px 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #f5f5f7;
      border-top: 1px solid #e5e5ea;
    }

    .sync-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .sync-dot.green {
      background: #34c759;
    }

    .sync-dot.amber {
      background: #ff9f0a;
    }

    .sync-dot.red {
      background: #ff3b30;
    }
  </style>
</head>

  <div class="container">
    <header>
      <div>
        <h1>Scaling Legal</h1>
        <div class="sub">CEO Dashboard</div>
      </div>
      <div class="live-badge">
        <div class="live-dot"></div>
        Live
      </div>
    </header>

    <div class="top-row">
      <div class="card">
        <div class="card-title">Time Tracking</div>
        <div class="month-nav">
          <button id="prevBtn" onclick="navigate(-1)">←</button>
          <span class="month-label" id="monthLabel"></span>
          <button id="nextBtn" onclick="navigate(1)">→</button>
        </div>
        <div class="dot-nav" id="dotNav"></div>
        <div class="stats-row" id="statsRow"></div>
        <div id="timeTrackingContent"></div>
      </div>

      <div class="card">
        <div class="card-title">Today's Schedule</div>
        <div class="schedule-date" id="scheduleDate"></div>
        <div id="allDayEvents" class="all-day-events"></div>
        <div id="scheduleContent"></div>
      </div>
    </div>

    <div class="rh-card">
      <div class="card-title">Retainer Overview</div>
      <div id="retainerCards"></div>
    </div>

    <div class="card">
      <div class="card-title">Contract Obligations</div>
      <div id="obligationsContent"></div>
    </div>

    <div class="card">
      <div class="card-title">Contract Management</div>
      <div class="contracts-grid" id="contractsGrid"></div>
    </div>

    <div class="generator-card">
      <div class="card-title">Contract Generator</div>
      <div class="generator-desc">Generate new contracts from our template library and store them in your generated contracts folder.</div>
      <div class="generator-actions">
        <a href="https://docs.google.com/document/d/1ovQdoU5GgoqDmXiXc4hNgo371tuT6FiXNlTGp5HnJ3w/edit" class="btn-primary">Open Template</a>
        <a href="https://drive.google.com/drive/folders/18fnUmbnKcsNrYokIMphdLEdWTlRRdzR4" class="btn-secondary">Generated Contracts</a>
      </div>
    </div>
  </div>

  <div class="sync-footer" id="syncFooter">
    <div class="sync-dot green" id="syncDot"></div>
    <span id="syncText">Synced</span>
  </div>

    function navigate(delta) {
      const newIndex = currentIndex + delta;
      if (newIndex >= 0 && newIndex < months.length) {
        currentIndex = newIndex;
        render(currentIndex);
      }
    }

    function render(index) {
      const month = months[index];
      document.getElementById('monthLabel').textContent = month.label;
      document.getElementById('prevBtn').disabled = index === 0;
      document.getElementById('nextBtn').disabled = index === months.length - 1;

      renderDotNav(index);
      const data = month.data;

      if (!data) {
        document.getElementById('timeTrackingContent').innerHTML = '<div class="no-data">No data for this month</div>';
        document.getElementById('statsRow').innerHTML = '';
        return;
      }

      document.getElementById('statsRow').innerHTML = `
        <div class="stat-box">
          <div class="val">${data.totalHours}</div>
          <div class="lbl">Total Hours</div>
        </div>
        <div class="stat-box">
          <div class="val">${data.totalEntries}</div>
          <div class="lbl">Entries</div>
        </div>
        <div class="stat-box">
          <div class="val">${data.clients}</div>
          <div class="lbl">Clients</div>
        </div>
        <div class="stat-box">
          <div class="val">${data.retainerCapacity}</div>
          <div class="lbl">Capacity</div>
        </div>
      `;

      let html = '';
      data.clientRows.forEach(client => {
        const displayPct = client.zero ? 0 : client.pct;
        html += `
          <div class="client-row">
            <div class="client-header">
              <span class="client-name ${client.zero ? 'zero' : ''}">${client.name}</span>
              <span class="client-hours">${client.hours}</span>
            </div>
            <div class="client-meta">${client.meta}</div>
            <div class="progress-track">
              <div class="progress-fill ${client.zero ? 'zero' : ''}" style="width: ${displayPct}%"></div>
            </div>
          </div>
        `;
      });

      if (month.driveLink) {
        html += `<a href="${month.driveLink}" class="drive-link">View full month in Google Drive</a>`;
      }

      document.getElementById('timeTrackingContent').innerHTML = html;
    }

    function renderDotNav(activeIndex) {
      let html = '';
      months.forEach((m, i) => {
        const hasData = m.data !== null;
        const isActive = i === activeIndex;
        let cls = 'dot';
        if (isActive) cls += ' active';
        else if (hasData) cls += ' has-data';
        html += `<div class="${cls}" onclick="currentIndex=${i}; render(${i})"></div>`;
      });
      document.getElementById('dotNav').innerHTML = html;
    }

        html += `

    function renderRetainerHistory() {
      const retainerClients = [
        {name: 'Careflux ehf.', cap: 30, match: c => c.name.includes('Careflux')},
        {name: 'Rivvi AI', cap: 30, match: c => c.name === 'Rivvi AI'},
        {name: 'Aftra ehf.', cap: 10, match: c => c.name === 'Aftra ehf.'}
      ];
      const last6 = months.slice(-6);

      let html = '';
      retainerClients.forEach(client => {
        const monthlyHours = last6.map(m => {
          if (!m.data) return 0;
          const row = m.data.clientRows.find(client.match);
          return row ? (parseFloat(row.hours) || 0) : 0;
        });
        const monthLabels = last6.map(m => m.label.split(' ')[0].substring(0, 3));

        const currentHours = monthlyHours[monthlyHours.length - 1];
        const pct = (currentHours / client.cap * 100).toFixed(0);
        const isOver = currentHours > client.cap;
        const totalUsed6mo = monthlyHours.reduce((a, b) => a + b, 0);
        const monthsWithData = last6.filter(m => m.data).length;
        const avg6mo = monthsWithData > 0 ? (totalUsed6mo / monthsWithData).toFixed(1) : '0.0';
        const maxH = Math.max(...monthlyHours, client.cap);

        let barsHtml = '<div class="rc-months">';
        monthlyHours.forEach((h, i) => {
          const barH = maxH > 0 ? Math.max((h / maxH) * 48, 3) : 3;
          const isLast = i === monthlyHours.length - 1;
          const overCap = h > client.cap;
          const barCls = isLast ? (overCap ? 'rc-month-bar active over' : 'rc-month-bar active') : (overCap ? 'rc-month-bar over' : 'rc-month-bar');
          const hrsCls = h === 0 ? 'rc-month-hours zero' : 'rc-month-hours';
          barsHtml += `<div class="rc-month">
            <div class="rc-month-bar-wrap"><div class="${barCls}" style="height:${barH}px"></div></div>
            <div class="rc-month-label">${monthLabels[i]}</div>
            <div class="${hrsCls}">${h > 0 ? h + 'h' : '—'}</div>
          </div>`;
        });
        barsHtml += '</div>';

        html += `
          <div class="rc-client">
            <div class="rc-header">
              <span class="rc-name">${client.name}</span>
              <span class="rc-cap">${currentHours}h / ${client.cap}h this month (${pct}%)</span>
            </div>
            <div class="rc-bar-track">
              <div class="rc-bar-fill ${isOver ? 'over' : ''}" style="width:${Math.min(pct, 100)}%"></div>
            </div>
            <div class="rc-stats">
              <span>Avg <strong>${avg6mo}h</strong>/mo</span>
              <span>Total <strong>${totalUsed6mo.toFixed(1)}h</strong> (6mo)</span>
              <span>Cap <strong>${client.cap}h</strong>/mo</span>
            </div>
            ${barsHtml}
          </div>
        `;
      });

      document.getElementById('retainerCards').innerHTML = html;
    }

    function renderObligations() {
      let html = '';
      obligations.forEach(section => {
        html += `<div class="ob-section-header">${section.section}</div>`;
        section.items.forEach(item => {
          const isDone = false;
          let dateClass = 'ob-date';
          if (item.overdue) dateClass += ' overdue';
          else if (item.soon) dateClass += ' soon';
          else if (item.upcoming) dateClass += ' upcoming';
          else if (item.future) dateClass += ' future';

          const rowClass = isDone ? 'ob-row done' : 'ob-row' + (item.overdue ? ' overdue' : '');
          const linkTitle = item.link ? `<a href="${item.link}">${item.title}</a>` : item.title;

          html += `
            <div class="${rowClass}">
              <div class="ob-info">
                <div class="ob-title">${linkTitle}</div>
                <div class="ob-sub">${item.sub}</div>
              </div>
              <div class="${dateClass}">${item.date}</div>
              <div class="ob-check" onclick="toggleObligationCheck(this, '${item.title}')"></div>
            </div>
          `;
        });
      });
      document.getElementById('obligationsContent').innerHTML = html;
    }

    function toggleObligationCheck(elem, title) {
      elem.classList.toggle('checked');
      elem.closest('.ob-row').classList.toggle('done');

    function updateSyncDisplay() {
      const lastSync = new Date(LAST_SYNCED);
      const now = new Date();
      const diffMs = now - lastSync;
      const diffMins = Math.floor(diffMs / 60000);
      const diffHours = Math.floor(diffMs / 3600000);

      const dot = document.getElementById('syncDot');
      const text = document.getElementById('syncText');

      if (diffHours >= 2) {
        dot.className = 'sync-dot amber';
        text.textContent = 'Stale · ' + (diffHours > 24 ? `${Math.floor(diffHours / 24)}d ago` : `${diffHours}h ago`);
      } else if (diffMs > 3600000) {
        dot.className = 'sync-dot amber';
        text.textContent = 'Stale · ' + diffHours + 'h ago';
      } else {
        dot.className = 'sync-dot green';
        const nextSync = 5 - (diffMins % 5);
        text.textContent = 'Synced · Next sync in ' + nextSync + 'm';
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      render(currentIndex);
      renderSchedule();
      renderRetainerHistory();
      renderObligations();
      renderContracts();
      updateSyncDisplay();
      setInterval(updateSyncDisplay, 60000);
    });
